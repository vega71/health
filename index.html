<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="운동 기록">
<meta name="theme-color" content="#1D9E75">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>운동 기록</title>
<style>
  :root {
    --green: #1D9E75;
    --green-light: #E1F5EE;
    --green-dark: #0F6E56;
    --purple: #7F77DD;
    --purple-light: #EEEDFE;
    --purple-dark: #534AB7;
    --gray-50: #F8F9FA;
    --gray-100: #F1F3F5;
    --gray-200: #E9ECEF;
    --gray-400: #868E96;
    --gray-600: #495057;
    --gray-800: #212529;
    --radius: 14px;
    --radius-sm: 10px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; font-family: -apple-system, 'Noto Sans KR', sans-serif; background: #fff; color: var(--gray-800); }

  /* Header */
  .header {
    background: #fff;
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--gray-200);
    position: sticky; top: 0; z-index: 10;
  }
  .header-row { display: flex; align-items: center; justify-content: space-between; }
  .app-title { font-size: 20px; font-weight: 700; color: var(--green-dark); display: flex; align-items: center; gap: 6px; }
  .date-nav { display: flex; align-items: center; gap: 6px; margin-top: 10px; }
  .date-nav button { background: none; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); padding: 9px 14px; font-size: 15px; cursor: pointer; color: var(--gray-600); font-family: inherit; }
  .date-nav button:active { background: var(--gray-100); }
  .date-nav button.today-btn { background: var(--green-light); border-color: var(--green); color: var(--green-dark); font-weight: 600; }
  .date-display { flex: 1; text-align: center; font-size: 17px; font-weight: 600; color: var(--gray-800); }

  /* Main scroll area */
  .main {
    height: calc(100vh - 100px - 58px - env(safe-area-inset-bottom, 0px));
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 80px;
  }

  /* Bottom nav */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #fff;
    border-top: 1px solid var(--gray-200);
    display: flex;
    padding-bottom: var(--safe-bottom);
  }
  .nav-btn {
    flex: 1; padding: 10px 0; background: none; border: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    font-size: 10px; color: var(--gray-400); font-family: inherit;
  }
  .nav-btn.active { color: var(--green); }
  .nav-btn svg { width: 22px; height: 22px; }
  .nav-btn .nav-label { font-size: 10px; font-weight: 500; }

  /* Time tabs */
  .time-tabs { display: flex; border-bottom: 1px solid var(--gray-200); background: #fff; }
  .time-tab {
    flex: 1; padding: 13px 4px; text-align: center; font-size: 15px;
    font-weight: 500; cursor: pointer; border: none; background: none;
    color: var(--gray-400); position: relative; font-family: inherit;
    display: flex; align-items: center; justify-content: center; gap: 4px;
  }
  .time-tab.active { color: var(--green-dark); }
  .time-tab.active::after { content: ''; position: absolute; bottom: 0; left: 10%; right: 10%; height: 2.5px; background: var(--green); border-radius: 2px; }
  .time-tab .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); display: none; }
  .time-tab.has-data .dot { display: block; }

  /* Sections */
  .section { padding: 14px 14px 6px; }
  .section-header {
    display: flex; align-items: center; gap: 7px;
    font-size: 13px; font-weight: 700; letter-spacing: .05em;
    text-transform: uppercase; color: var(--gray-400);
    margin-bottom: 10px;
  }
  .section-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .dot-cardio { background: var(--green); }
  .dot-strength { background: var(--purple); }

  /* Exercise cards */
  .ex-card {
    background: var(--gray-50);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
    border: 1.5px solid var(--gray-200);
  }
  .ex-name { font-size: 16px; font-weight: 600; color: var(--gray-800); margin-bottom: 12px; }
  .ex-fields { display: flex; gap: 12px; flex-wrap: wrap; }
  .field-group { display: flex; align-items: center; gap: 7px; }
  .field-label { font-size: 14px; color: var(--gray-400); min-width: 30px; }
  input[type=number] {
    width: 88px; height: 44px; font-size: 18px; font-weight: 600;
    text-align: center; border: 1.5px solid var(--gray-200);
    border-radius: var(--radius-sm); background: #fff; color: var(--gray-800);
    font-family: inherit; -moz-appearance: textfield;
  }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type=number]:focus { outline: none; border-color: var(--green); }
  .field-unit { font-size: 14px; color: var(--gray-400); }

  /* Note */
  .note-area {
    width: 100%; min-height: 68px; padding: 11px 13px;
    font-size: 15px; font-family: inherit;
    border: 1.5px solid var(--gray-200); border-radius: var(--radius);
    background: var(--gray-50); color: var(--gray-800); resize: none;
  }
  .note-area:focus { outline: none; border-color: var(--green); background: #fff; }

  /* Save button - extra bottom padding so it clears the nav bar */
  .save-wrap { padding: 12px 14px calc(16px + env(safe-area-inset-bottom, 0px)); }
  .save-btn {
    width: 100%; padding: 17px; border: none; border-radius: var(--radius);
    background: var(--green); color: #fff; font-size: 17px; font-weight: 700;
    cursor: pointer; font-family: inherit; display: flex; align-items: center;
    justify-content: center; gap: 8px;
  }
  .save-btn:active { background: var(--green-dark); transform: scale(.98); }

  /* History */
  .summary-row { display: flex; gap: 10px; padding: 14px 14px 8px; }
  .stat-card {
    flex: 1; background: var(--gray-50); border-radius: var(--radius);
    padding: 14px 10px; border: 1.5px solid var(--gray-200); text-align: center;
  }
  .stat-val { font-size: 26px; font-weight: 700; color: var(--gray-800); }
  .stat-unit { font-size: 13px; color: var(--gray-400); }
  .stat-label { font-size: 13px; color: var(--gray-400); margin-top: 2px; }

  .hist-item {
    margin: 0 14px 10px;
    border: 1.5px solid var(--gray-200); border-radius: var(--radius);
    overflow: hidden;
  }
  .hist-date {
    background: var(--gray-100); padding: 10px 13px;
    font-size: 15px; font-weight: 700; color: var(--gray-600);
    display: flex; align-items: center; justify-content: space-between;
  }
  .hist-body { padding: 10px 13px; }
  .hist-badges { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 6px; }
  .hist-badge {
    font-size: 13px; padding: 5px 11px; border-radius: 20px; font-weight: 500;
  }
  .badge-cardio { background: var(--green-light); color: var(--green-dark); }
  .badge-strength { background: var(--purple-light); color: var(--purple-dark); }
  .hist-note { font-size: 13px; color: var(--gray-400); margin-top: 5px; }
  .empty-state {
    text-align: center; padding: 50px 20px;
    color: var(--gray-400); font-size: 16px;
  }
  .empty-state .icon { font-size: 52px; margin-bottom: 12px; }

  /* History detail modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.45); align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; width: 100%; max-height: 85vh;
    border-radius: 20px 20px 0 0; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 18px 12px; border-bottom: 1px solid var(--gray-200);
    flex-shrink: 0;
  }
  .modal-title { font-size: 17px; font-weight: 700; color: var(--gray-800); }
  .modal-close {
    background: var(--gray-100); border: none; border-radius: 50%;
    width: 32px; height: 32px; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; color: var(--gray-600);
  }
  .modal-body { overflow-y: auto; padding: 14px 18px; flex: 1; }
  .modal-footer {
    padding: 12px 18px calc(12px + env(safe-area-inset-bottom, 0px));
    border-top: 1px solid var(--gray-200); flex-shrink: 0;
  }
  .delete-btn {
    width: 100%; padding: 14px; border: 1.5px solid #E24B4A; border-radius: var(--radius);
    background: #fff; color: #E24B4A; font-size: 16px; font-weight: 600;
    cursor: pointer; font-family: inherit; display: flex; align-items: center;
    justify-content: center; gap: 7px;
  }
  .delete-btn:active { background: #FCEBEB; }
  .modal-section-title {
    font-size: 13px; font-weight: 700; letter-spacing: .05em;
    text-transform: uppercase; color: var(--gray-400);
    display: flex; align-items: center; gap: 6px;
    margin: 14px 0 8px;
  }
  .modal-section-title:first-child { margin-top: 0; }
  .modal-ex-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 0; border-bottom: 1px solid var(--gray-100);
    font-size: 15px;
  }
  .modal-ex-row:last-child { border-bottom: none; }
  .modal-ex-name { color: var(--gray-600); }
  .modal-ex-val { font-weight: 600; color: var(--gray-800); }
  .modal-time-label {
    font-size: 13px; font-weight: 700; color: var(--gray-400);
    margin: 12px 0 6px; display: flex; align-items: center; gap: 5px;
  }
  .modal-note {
    background: var(--gray-50); border-radius: var(--radius-sm);
    padding: 10px 12px; font-size: 14px; color: var(--gray-600);
    margin-top: 6px; border: 1px solid var(--gray-200);
  }
  .no-data { font-size: 14px; color: var(--gray-400); padding: 8px 0; }

  /* Confirm dialog */
  .confirm-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.5); align-items: center; justify-content: center;
    padding: 24px;
  }
  .confirm-overlay.open { display: flex; }
  .confirm-box {
    background: #fff; border-radius: var(--radius); padding: 24px 20px 20px;
    width: 100%; max-width: 320px; text-align: center;
  }
  .confirm-title { font-size: 17px; font-weight: 700; margin-bottom: 8px; color: var(--gray-800); }
  .confirm-desc { font-size: 14px; color: var(--gray-400); margin-bottom: 20px; line-height: 1.5; }
  .confirm-btns { display: flex; gap: 10px; }
  .confirm-cancel {
    flex: 1; padding: 13px; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm);
    background: #fff; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; color: var(--gray-600);
  }
  .confirm-ok {
    flex: 1; padding: 13px; border: none; border-radius: var(--radius-sm);
    background: #E24B4A; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;
  }

  /* Hist date clickable */
  .hist-date { cursor: pointer; }
  .hist-date:active { background: var(--gray-200); }
  .hist-date-arrow { font-size: 13px; color: var(--gray-400); }

  /* Toast */
  .toast {
    position: fixed; bottom: calc(70px + var(--safe-bottom)); left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--gray-800); color: #fff;
    padding: 10px 20px; border-radius: 30px;
    font-size: 14px; font-weight: 500;
    opacity: 0; transition: opacity .25s, transform .25s; pointer-events: none;
    white-space: nowrap; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Install banner */
  .install-banner {
    display: none; margin: 10px 14px 0;
    background: var(--green-light); border: 1.5px solid var(--green);
    border-radius: var(--radius); padding: 12px 14px;
    align-items: center; gap: 10px; font-size: 13px; color: var(--green-dark);
  }
  .install-banner.visible { display: flex; }
  .install-banner button {
    margin-left: auto; background: var(--green); color: #fff;
    border: none; border-radius: var(--radius-sm); padding: 7px 14px;
    font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
    white-space: nowrap;
  }
  .close-banner { background: none !important; color: var(--gray-400) !important; padding: 4px 8px !important; margin-left: 0 !important; }
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div class="app-title">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      운동 기록
    </div>
  </div>
  <div class="date-nav">
    <button onclick="changeDate(-1)">◀</button>
    <span class="date-display" id="dateDisplay"></span>
    <button onclick="changeDate(1)">▶</button>
    <button class="today-btn" onclick="goToday()">오늘</button>
  </div>
</div>

<div class="install-banner" id="installBanner">
  <span>📱 홈 화면에 앱으로 추가할 수 있어요</span>
  <button onclick="doInstall()">설치</button>
  <button class="close-banner" onclick="document.getElementById('installBanner').classList.remove('visible')">✕</button>
</div>

<div class="main" id="mainContent">
  <div id="recordView">
    <div class="time-tabs">
      <button class="time-tab active" id="tab-morning" onclick="switchTime('morning')">
        ☀️ 오전 <span class="dot"></span>
      </button>
      <button class="time-tab" id="tab-afternoon" onclick="switchTime('afternoon')">
        🌤 오후 <span class="dot"></span>
      </button>
      <button class="time-tab" id="tab-evening" onclick="switchTime('evening')">
        🌙 저녁 <span class="dot"></span>
      </button>
    </div>
    <div id="exerciseContent"></div>
    <div class="save-wrap">
      <button class="save-btn" onclick="saveRecord()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        저장하기
      </button>
    </div>
  </div>
  <div id="historyView" style="display:none; padding-bottom:20px"></div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalBox">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle"></span>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="delete-btn" onclick="confirmDelete()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        이 날 기록 삭제
      </button>
    </div>
  </div>
</div>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-title">기록을 삭제할까요?</div>
    <div class="confirm-desc" id="confirmDesc"></div>
    <div class="confirm-btns">
      <button class="confirm-cancel" onclick="closeConfirm()">취소</button>
      <button class="confirm-ok" onclick="doDelete()">삭제</button>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" id="nav-record" onclick="switchView('record')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 12H3"/><path d="M16 6H3"/><path d="M16 18H3"/><polyline points="19 9 21 11 15 17"/></svg>
    <span class="nav-label">기록</span>
  </button>
  <button class="nav-btn" id="nav-history" onclick="switchView('history')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
    <span class="nav-label">히스토리</span>
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
const EXERCISES = {
  cardio: [
    { id: 'steps', name: '걸음수', fields: [{ key: 'count', label: '', unit: '걸음' }] },
    { id: 'cycling', name: '자전거 / 실내자전거', fields: [{ key: 'min', label: '', unit: '분' }] },
    { id: 'aerobic', name: '기타 유산소', fields: [{ key: 'min', label: '', unit: '분' }] },
  ],
  strength: [
    { id: 'calf_raise', name: '뒤꿈치 들기', fields: [{ key: 'sets', label: '세트', unit: '세트' }, { key: 'reps', label: '횟수', unit: '회' }] },
    { id: 'leg_lift', name: '앉아서 다리 들어올리기', fields: [{ key: 'sets', label: '세트', unit: '세트' }, { key: 'reps', label: '횟수', unit: '회' }] },
    { id: 'band', name: '밴드 운동', fields: [{ key: 'sets', label: '세트', unit: '세트' }, { key: 'reps', label: '횟수', unit: '회' }] },
    { id: 'situp', name: '윗몸일으키기', fields: [{ key: 'sets', label: '세트', unit: '세트' }, { key: 'reps', label: '횟수', unit: '회' }] },
    { id: 'squat', name: '스쿼트', fields: [{ key: 'sets', label: '세트', unit: '세트' }, { key: 'reps', label: '횟수', unit: '회' }] },
    { id: 'pushup', name: '팔굽혀펴기', fields: [{ key: 'sets', label: '세트', unit: '세트' }, { key: 'reps', label: '횟수', unit: '회' }] },
  ]
};

let currentDate = new Date();
let currentTime = 'morning';
let currentMainView = 'record';
let records = {};
let deferredPrompt = null;

function dateKey(d) {
  return d.toFullYear
    ? d.toFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0')
    : d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function fmtDate(d) {
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
}
function isToday(d) {
  const t = new Date();
  return d.getFullYear()===t.getFullYear() && d.getMonth()===t.getMonth() && d.getDate()===t.getDate();
}
function changeDate(n) {
  currentDate = new Date(currentDate);
  currentDate.setDate(currentDate.getDate() + n);
  renderAll();
}
function goToday() {
  currentDate = new Date();
  renderAll();
}
function switchTime(t) {
  currentTime = t;
  document.querySelectorAll('.time-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + t).classList.add('active');
  renderExercises();
}
function switchView(v) {
  currentMainView = v;
  document.getElementById('recordView').style.display = v === 'record' ? '' : 'none';
  document.getElementById('historyView').style.display = v === 'history' ? '' : 'none';
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + v).classList.add('active');
  if (v === 'history') renderHistory();
}

function getTimeRecord() {
  const k = dateKey(currentDate);
  if (!records[k]) records[k] = {};
  if (!records[k][currentTime]) records[k][currentTime] = {};
  return records[k][currentTime];
}

function hasDayTimeData(time) {
  const k = dateKey(currentDate);
  const tr = records[k]?.[time];
  if (!tr) return false;
  return [...EXERCISES.cardio, ...EXERCISES.strength].some(ex => {
    const v = tr[ex.id];
    return v && ex.fields.some(f => v[f.key] > 0);
  });
}

function updateTimeDots() {
  ['morning','afternoon','evening'].forEach(t => {
    const tab = document.getElementById('tab-' + t);
    if (hasDayTimeData(t)) tab.classList.add('has-data');
    else tab.classList.remove('has-data');
  });
}

function renderExercises() {
  const rec = getTimeRecord();
  let html = '';

  // Cardio
  html += `<div class="section">
    <div class="section-header"><span class="section-dot dot-cardio"></span>유산소 운동</div>`;
  EXERCISES.cardio.forEach(ex => {
    const v = rec[ex.id] || {};
    html += `<div class="ex-card"><div class="ex-name">${ex.name}</div><div class="ex-fields">`;
    ex.fields.forEach(f => {
      html += `<div class="field-group">
        ${f.label ? `<span class="field-label">${f.label}</span>` : ''}
        <input type="number" min="0" id="f_${ex.id}_${f.key}" value="${v[f.key]||''}" placeholder="0" inputmode="numeric">
        <span class="field-unit">${f.unit}</span>
      </div>`;
    });
    html += `</div></div>`;
  });
  html += `</div>`;

  // Strength
  html += `<div class="section">
    <div class="section-header"><span class="section-dot dot-strength"></span>근육강화 운동</div>`;
  EXERCISES.strength.forEach(ex => {
    const v = rec[ex.id] || {};
    html += `<div class="ex-card"><div class="ex-name">${ex.name}</div><div class="ex-fields">`;
    ex.fields.forEach(f => {
      html += `<div class="field-group">
        <span class="field-label">${f.label}</span>
        <input type="number" min="0" id="f_${ex.id}_${f.key}" value="${v[f.key]||''}" placeholder="0" inputmode="numeric">
        <span class="field-unit">${f.unit}</span>
      </div>`;
    });
    html += `</div></div>`;
  });
  html += `</div>`;

  // Note
  const note = rec._note || '';
  html += `<div class="section">
    <div class="section-header">📝 메모</div>
    <textarea class="note-area" id="f_note" placeholder="오늘 운동 소감이나 특이사항">${note}</textarea>
  </div>`;

  document.getElementById('exerciseContent').innerHTML = html;
}

function saveRecord() {
  const rec = getTimeRecord();
  [...EXERCISES.cardio, ...EXERCISES.strength].forEach(ex => {
    const obj = {};
    ex.fields.forEach(f => {
      const el = document.getElementById(`f_${ex.id}_${f.key}`);
      if (el) obj[f.key] = parseInt(el.value) || 0;
    });
    rec[ex.id] = obj;
  });
  const noteEl = document.getElementById('f_note');
  if (noteEl) rec._note = noteEl.value.trim();
  persist();
  updateTimeDots();
  showToast('저장되었습니다 ✓');
}

function renderHistory() {
  const keys = Object.keys(records).sort((a, b) => b.localeCompare(a));
  let totalSteps = 0;
  keys.forEach(k => {
    ['morning','afternoon','evening'].forEach(t => {
      const v = records[k]?.[t]?.steps;
      if (v?.count) totalSteps += v.count;
    });
  });

  let html = `<div class="summary-row">
    <div class="stat-card"><div class="stat-val">${keys.length}</div><div class="stat-unit">일</div><div class="stat-label">총 기록 일수</div></div>
    <div class="stat-card"><div class="stat-val">${totalSteps.toLocaleString()}</div><div class="stat-unit">걸음</div><div class="stat-label">누적 걸음수</div></div>
  </div>`;

  if (!keys.length) {
    html += `<div class="empty-state"><div class="icon">📋</div>아직 기록이 없어요.<br>운동 후 기록을 남겨보세요!</div>`;
    document.getElementById('historyView').innerHTML = html;
    return;
  }

  keys.forEach(k => {
    const dayRec = records[k];
    const d = new Date(k + 'T00:00:00');
    const days = ['일','월','화','수','목','금','토'];
    const label = `${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
    const todayMark = (k === dateKey(new Date())) ? ' 🟢 오늘' : '';
    html += `<div class="hist-item">
      <div class="hist-date" onclick="openModal('${k}')">
        <span>${label}${todayMark}</span>
        <span class="hist-date-arrow">상세 ›</span>
      </div>
      <div class="hist-body">`;

    let hasAny = false;
    ['morning','afternoon','evening'].forEach(t => {
      const tr = dayRec[t];
      if (!tr) return;
      const tLabel = {morning:'오전',afternoon:'오후',evening:'저녁'}[t];
      let cItems = [], sItems = [];
      EXERCISES.cardio.forEach(ex => {
        const v = tr[ex.id];
        if (!v) return;
        if (ex.id === 'steps' && v.count > 0) cItems.push(`걸음 ${v.count.toLocaleString()}`);
        else if (v.min > 0) cItems.push(`${ex.name} ${v.min}분`);
      });
      EXERCISES.strength.forEach(ex => {
        const v = tr[ex.id];
        if (!v) return;
        if (v.sets > 0 || v.reps > 0) sItems.push(`${ex.name} ${v.sets||0}×${v.reps||0}`);
      });
      if (cItems.length > 0) { html += `<span class="hist-badge badge-cardio">${tLabel} ${cItems.join(' · ')}</span> `; hasAny = true; }
      if (sItems.length > 0) { html += `<span class="hist-badge badge-strength">${tLabel} ${sItems.join(' · ')}</span> `; hasAny = true; }
    });

    if (!hasAny) html += `<span style="font-size:13px;color:#868E96">기록 없음</span>`;

    ['morning','afternoon','evening'].forEach(t => {
      const note = dayRec[t]?._note;
      if (note) {
        const tLabel = {morning:'오전',afternoon:'오후',evening:'저녁'}[t];
        html += `<div class="hist-note">💬 ${tLabel}: ${note}</div>`;
      }
    });

    html += `</div></div>`;
  });

  document.getElementById('historyView').innerHTML = html;
}

let modalDateKey = null;

function openModal(k) {
  modalDateKey = k;
  const dayRec = records[k] || {};
  const d = new Date(k + 'T00:00:00');
  const days = ['일','월','화','수','목','금','토'];
  const label = `${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
  document.getElementById('modalTitle').textContent = label;

  const timeLabels = {morning:'☀️ 오전', afternoon:'🌤 오후', evening:'🌙 저녁'};
  let html = '';

  ['morning','afternoon','evening'].forEach(t => {
    const tr = dayRec[t];
    let cardioRows = '', strengthRows = '', hasCardio = false, hasStrength = false;

    EXERCISES.cardio.forEach(ex => {
      const v = tr?.[ex.id];
      if (!v) return;
      if (ex.id === 'steps' && v.count > 0) {
        cardioRows += `<div class="modal-ex-row"><span class="modal-ex-name">${ex.name}</span><span class="modal-ex-val">${v.count.toLocaleString()} 걸음</span></div>`;
        hasCardio = true;
      } else if (v.min > 0) {
        cardioRows += `<div class="modal-ex-row"><span class="modal-ex-name">${ex.name}</span><span class="modal-ex-val">${v.min} 분</span></div>`;
        hasCardio = true;
      }
    });
    EXERCISES.strength.forEach(ex => {
      const v = tr?.[ex.id];
      if (!v) return;
      if (v.sets > 0 || v.reps > 0) {
        strengthRows += `<div class="modal-ex-row"><span class="modal-ex-name">${ex.name}</span><span class="modal-ex-val">${v.sets||0}세트 × ${v.reps||0}회</span></div>`;
        hasStrength = true;
      }
    });

    if (!hasCardio && !hasStrength && !tr?._note) return;

    html += `<div class="modal-time-label">${timeLabels[t]}</div>`;
    if (hasCardio) {
      html += `<div class="modal-section-title"><span style="width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block"></span>유산소</div>${cardioRows}`;
    }
    if (hasStrength) {
      html += `<div class="modal-section-title"><span style="width:8px;height:8px;border-radius:50%;background:var(--purple);display:inline-block"></span>근육강화</div>${strengthRows}`;
    }
    if (tr?._note) {
      html += `<div class="modal-note">💬 ${tr._note}</div>`;
    }
  });

  if (!html) html = `<div class="no-data">이 날은 기록된 운동이 없어요.</div>`;
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function confirmDelete() {
  if (!modalDateKey) return;
  const d = new Date(modalDateKey + 'T00:00:00');
  const days = ['일','월','화','수','목','금','토'];
  const label = `${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
  document.getElementById('confirmDesc').textContent = `${label}의 모든 운동 기록이 삭제됩니다.`;
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('open');
}
function doDelete() {
  if (!modalDateKey) return;
  delete records[modalDateKey];
  persist();
  closeConfirm();
  closeModalDirect();
  renderHistory();
  showToast('삭제되었습니다');
  modalDateKey = null;
}

function renderAll() {
  document.getElementById('dateDisplay').textContent = fmtDate(currentDate);
  renderExercises();
  updateTimeDots();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function persist() {
  try { localStorage.setItem('exercise_records_v2', JSON.stringify(records)); } catch(e) {}
}
function loadData() {
  try {
    const raw = localStorage.getItem('exercise_records_v2');
    if (raw) records = JSON.parse(raw);
  } catch(e) {}
}

// PWA install
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.add('visible');
});
function doInstall() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    document.getElementById('installBanner').classList.remove('visible');
  });
}
window.addEventListener('appinstalled', () => {
  document.getElementById('installBanner').classList.remove('visible');
  showToast('앱이 설치되었습니다! 🎉');
});

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// Init
loadData();
renderAll();
</script>
</body>
</html>
